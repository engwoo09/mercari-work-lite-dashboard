<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mercari Work Lite Dashboard</title>
  <style>
    :root { --red:#ff0211; --blue:#1a73e8; --ink:#202124; --muted:#5f6368; --line:#dde3ea; --bg:#f7f9fc; --panel:#fff; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; color:var(--ink); background:var(--bg); }
    header { position:sticky; top:0; z-index:5; background:#fff; border-bottom:3px solid var(--red); padding:14px 18px; box-shadow:0 4px 16px rgba(0,0,0,.06); }
    h1 { margin:0; font-size:20px; }
    main { max-width:1100px; margin:0 auto; padding:16px; display:grid; gap:14px; }
    section { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:14px; }
    h2 { margin:0 0 10px; font-size:17px; }
    .muted { color:var(--muted); font-size:13px; }
    .toolbar { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
    button { border:1px solid var(--line); border-radius:6px; background:#fff; color:var(--ink); padding:8px 10px; font:inherit; cursor:pointer; }
    button.primary { background:var(--blue); border-color:var(--blue); color:#fff; font-weight:700; }
    input, textarea, select { width:100%; min-width:0; max-width:100%; border:1px solid var(--line); border-radius:6px; padding:9px; font:inherit; background:#fff; }
    textarea { min-height:150px; resize:vertical; line-height:1.45; overflow:auto; white-space:pre-wrap; overflow-wrap:anywhere; word-break:break-word; }
    label { display:block; margin:9px 0 5px; color:var(--muted); font-size:13px; }
    .grid { display:grid; grid-template-columns:minmax(0, 1fr) minmax(0, 1.2fr); gap:12px; align-items:start; }
    .grid > div { min-width:0; }
    .ids { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
    .id { border:1px solid var(--line); border-radius:999px; padding:5px 8px; background:#fff; font-size:13px; }
    .snippet-list { display:grid; gap:8px; max-height:560px; overflow:auto; }
    .snippet-row { text-align:left; display:block; width:100%; min-width:0; overflow:hidden; border:1px solid var(--line); border-radius:8px; padding:9px; background:#fff; }
    .snippet-row.active { border-color:var(--blue); box-shadow:0 0 0 2px rgba(26,115,232,.12); }
    .snippet-row strong { display:block; color:var(--blue); margin-bottom:4px; }
    .snippet-row span { display:block; max-width:100%; color:var(--muted); font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .notice { border-left:4px solid var(--red); background:#fff8f8; }
    @media (max-width:760px) { .grid { grid-template-columns:1fr; } header { position:static; } }
  </style>
</head>
<body>
<header>
  <h1>Mercari Work Lite Dashboard</h1>
  <div class="muted">오프너와 자동메시지 확인, 수정, 복사만 포함한 팀 공용 화면입니다.</div>
</header>
<main>
  <section>
    <h2>Opener</h2>
    <div class="toolbar">
      <select id="mode" style="max-width:180px"><option value="item">상품</option><option value="transaction">거래</option></select>
      <button class="primary" id="openTabs">ID 탭 열기</button>
      <button id="copyIds">ID 복사</button>
    </div>
    <label>Mercari ID</label>
    <textarea id="idsInput" style="min-height:80px" placeholder="m77864178973 m37396343224"></textarea>
    <div id="idList" class="ids"></div>
  </section>
  <section>
    <h2>자동메시지</h2>
    <div class="grid">
      <div>
        <label>검색</label>
        <input id="search" placeholder="@배송문의 또는 문구 일부">
        <div id="snippetList" class="snippet-list" style="margin-top:10px"></div>
      </div>
      <div>
        <label>단축어</label>
        <input id="trigger">
        <label>내용 확인 및 수정</label>
        <textarea id="message"></textarea>
        <div class="toolbar" style="margin-top:8px">
          <button class="primary" id="copyMessage">수정한 내용 복사</button>
          <button id="saveMessage">이 브라우저에 수정 저장</button>
          <button id="resetMessage">기본값으로 되돌리기</button>
        </div>
        <p id="status" class="muted"></p>
      </div>
    </div>
  </section>
  <section class="notice">
    <div class="muted">수정 저장은 이 대시보드 화면의 localStorage에만 저장됩니다. 입력창 자동치환용 Tampermonkey 스크립트의 기본 문구를 바꾸려면 스크립트 파일도 갱신해야 합니다.</div>
  </section>
</main>
<script>
const DEFAULT_SNIPPETS = [{"trigger":"@샵스인사","text":"こんにちは。合同会社HEYCOです。\n韓国のお客様向けに購入・配送代行を行っております。\n\nお手数ですが、スムーズなお取引のため、以下2点にご協力いただけますと幸いです。\n\n① 追跡番号なしの発送方法の場合（定形外郵便など）\n→ 商品確認のため、仮注文番号(⭐)の記載をお願いいたします。\n\n② 適格請求書（インボイス）の発行\n→ 発行事業者様は、以下の内容を記載のうえ、インボイスのご対応をお願いいたします。\n\t•\t宛名：合同会社HEYCO\n\t•\tメール：merukariheyco01@gmail.com\n\t•\t備考：商品代金など\n※メールでの送付を推奨しておりますが、商品に同封でも構いません。\n\nどちらも任意のお願いであり、お取引自体には影響ございません。\nご検討いただけましたら幸いです。何卒よろしくお願いいたします。","enabled":true},{"trigger":"@배송문의","text":"お忙しい中申し訳ありませんが、発送期限が過ぎていることに気づきました。発送可能な日程をお知らせいただけますでしょうか。大幅な遅れが生じる場合は、キャンセルをお願いする可能性もございますので、ご事情をお聞かせください。よろしくお願いいたします。","enabled":true},{"trigger":"@정밀검수","text":"[상품 도착 안내] 정밀 검수 사진 확인 요청\n도착 상품의 정밀 검수 사진 업로드가 완료되었습니다. 아래 두 가지 중 한 가지 방법으로 검수 확인을 부탁드립니다.\n1. 2차 결제 (실비 정산) 진행\n2. 결제가 어려운 경우, 1:1 문의 게시판에 **'정밀검수 확인 완료'**라고 남겨주세요.\n▶ 정밀검수 확인이 필수인 이유\n최종 동의 절차: 사진으로 확인 가능한 범위 내에서 상품 상태에 최종 동의하는 절차입니다.\n책임 소재: 사진 확인 후 별도 문의 없이 진행될 경우, 사진 기준으로 상품에 문제가 없음을 동의하신 것으로 간주됩니다.\n대응 불가: 이후 실물 수령 후 사진에서 확인 가능했던 부분을 놓쳐 발생한 문제에 대해서는 대응이 어렵거나 불가할 수 있습니다.\n메루카리 규정: 구매자 평가가 완료되면 출품자에게 대금이 지급되어, 이후 출품자가 응대를 거부하거나 사무국 지원이 제한됩니다.\n▶ 확인 기한 (문자 발송 당일 · 영업시간 내)\n원활한 처리를 위해 본 문자 발송일의 영업시간 내에 회신을 부탁드립니다.\n영업시간 내 회신이 없을 경우, 검수 결과에 동의하신 것으로 보고 당사 기준에 따라 평가 및 실비 정산 등 거래를 진행할 수 있으며, 그 이후에는 상품 관련 추가 대응이 어렵습니다.","enabled":true},{"trigger":"@주소","text":"〒559-0034\n大阪府 大阪市住之江区 南港北2-1-10 ITM棟12階 C-4 heyco-office\n山田 花子(ヤマダ ハナコ) 様\n06-4703-3277\nここでお願いします。","enabled":true},{"trigger":"@합배수정","text":"합배송 중 일부 주문이 취소되었습니다. 취소된 주문을 제외한 나머지 합배송 주문건들은 이미 입고되어 있어 다음과 같이 안내드립니다.\n1. 추가 없이 도착한 주문만 입고 진행\n- 취소된 상품이 도착하지 않아 무게가 0g이므로, 개인결제창을 통해 국제배송비를 별도 결제하셔야 합니다.\n2. 새로운 주문 혹은 기존 주문을 합배송에 포함\n- 어떤 주문을 어디에 포함하고 싶으신지 명확히 알려주셔야 합니다.\n위 두 가지 경우 모두 1:1 문의 게시판으로 회신해 주셔야 처리가 가능하오니 양해 부탁드립니다.\n\n- 현재 합배송 중 입고완료된 주문번호\n:","enabled":true},{"trigger":"@송료포함","text":"안녕하세요. 고객님.\n메루카리샵스의 경우 상점 정책에 따라 상품가에 송료가 포함되지 않고 구매자가 별도 지불하도록 설정할 수 있습니다. 해당 출품의 경우 상품가 000엔 외 송료가 000엔 발생하는 출품입니다. 해당 내용은 구매 시 출품페이지에서 확인이 가능합니다. 발생하는 송료는 상품가에 반영해 2차정산 시 처리되므로 참고부탁드립니다. 그대로 진행하실 지 1:1문의 게시판으로 회신부탁드립니다.","enabled":true},{"trigger":"@착불","text":"この度は、メルカリ公式パートナーとして、商品購入の申し込みをされた海外のお客さまに代わってお手続きさせていただきます「heyco」です。通常の取引と変わらず、出品者様側で特別な対応は一切不要ですので、ご安心ください。お取引終了まで責任をもってご対応させていただきます。また、★梱包の際は商品IDをご明記いただけますと幸いです（商品IDは取引画面でご確認いただけます）。なお、複数商品を購入した場合は、各取引ごとに発送をお願いいたします。また、記載のないおまけ等がございましたら事前にお知らせください。ご不明点やお取引が難しい場合は、お気軽にお知らせくださいませ。\n\nお世話になっております。着払いの場合、取引画面で追跡番号を確認することが難しいため、運送会社名、追跡番号、着払い料金を教えていただけますでしょうか？\nスムーズな受け取り確認を行うため、ご協力お願いします。","enabled":true},{"trigger":"@취소사유","text":"連絡不在及び発送期限超過のため、やむを得ずキャンセルさせていただきます。一旦キャンセルさせていただきますが、発送可能であれば取引を再開させていただきます。 発送が遅れる場合は、新しい発送日をお知らせください。","enabled":true},{"trigger":"@추적불가","text":"お世話になっております。発送通知をいただいておりますが、現在追跡確認ができない状況となっております。問題ないかご確認いただけますでしょうか。","enabled":true},{"trigger":"@주류안내","text":"주류 첫 구매에 대한 안내입니다. 향후 주류 구매 시 아래 내용을 참고해 주시기 바랍니다. 이후 거래에서는 별도 안내가 없으니 양해 부탁드립니다.\n\n1. 주류는 통관 시 용량, 도수, 주종 등에 따라 관부가세 및 추가세금(교육세, 주세 등)이 발생합니다. (자세한 내용은 관세청 125번으로 문의)\n2. 항공특송으로 배송 시 도수 70도 이상의 주류는 통관이 불가하여 자동으로 선편으로 변경됩니다.","enabled":true},{"trigger":"@가격인상","text":"상품가격이 0,000엔으로 인상되어 안내드립니다. 결제하신 가격으로 인하요청을 진행 중이나, 거절될 수 있습니다. 가격인하가 되지 않더라도 현재 가격으로 구매를 진행하실지 1:1 문의 게시판으로 회신 부탁드립니다. 회신이 지연될 경우 부득이하게 주문이 취소될 수 있는 점 양해 부탁드립니다.","enabled":true},{"trigger":"@묶음변동","text":"고객님께서 요청하신 묶음 주문 상품 중 n번째 상품(000엔)이 품절되거나 페이지가 삭제되어 현재 구매가 불가능합니다.\n만약 품절된 상품을 제외한 나머지 상품만이라도 구매를 원하실 경우, 1:1 문의 게시판으로 회신해 주시기를 바랍니다.\n만약 회신이 없을 경우, 주문이 취소될 수 있으니 양해 부탁드립니다.\n회신을 확인하는 과정에서 추가 품절이 발생할 수 있으며, 이 경우 구매 가능한 남은 상품으로만 주문이 진행됩니다.\n(예시: 3개 주문 중 1개가 품절되어 2개 구매에 동의하셨으나, 이후 1개가 추가로 품절되면 남은 1개만 진행됩니다.)","enabled":true},{"trigger":"@특수패킹","text":"안녕하세요, 고객님.\n\n구매하신 메루카리 상품의 특수포장에 대해 안내드립니다.\n\n★중요: 이 메시지를 보낸 날부터 2일 안에 게시판으로 답변이 없으면 특수포장에 동의하신 것으로 보고 자동으로 진행됩니다.\n답변 기한: [메시지 보낸 날부터 2일]\n━━━━━━━━━━━━━━━━━━\n★왜 특수포장이 필요한가요?\n고객님의 상품은 국제 배송 중 파손될 위험이 높아서 안전한 배송을 위해 특수포장을 권장합니다.\n- 맞춤 케이스 제작\n- 충격 완화 재료 사용\n- 내부 고정 작업\n━━━━━━━━━━━━━━━━━━\n★예상 비용: 0,000엔\n상품 종류, 크기, 무게에 따라 다릅니다 (비용 및 특수패킹 관련 아래 링크 참고)\nhttps://docs.google.com/document/d/1U6idJUG1BnQ2kD3hh4Xzkft2rBEpvcH0Cu7s0hGynF8/edit?usp=sharing\n(참고: 특수포장을 거부하셔도 국제 배송 규정상 기본 포장 작업이 필요해서 최소 비용이 발생할 수 있습니다.)\n\n★주의사항\n특수포장을 하면 비용이 많이 들고, 무게가 늘어나서 진행 후에는 취소가 불가능합니다.\n따라서 고객님의 확인과 동의가 필요합니다.\n\n★답변 방법 (게시판에 작성해주세요)\nO : 특수포장을 원하시는 경우\n  → 게시판에 \"특수포장 진행 동의합니다\" 라고 남겨주세요\n  → 또는 답변 없이 2일이 지나면 동의하신 것으로 간주됩니다\n\nX : 특수포장을 원하지 않는 경우\n  → 게시판에 이렇게 남겨주세요:\n  \"특수포장을 거부하며, 국제 배송 중 파손이 발생해도 책임을 묻지 않겠습니다.\"\n\n★빠른 답변을 주시면 더 빨리 배송 처리가 가능합니다.\n기한 내에 답변 주시면 바로 처리하겠습니다.\n━━━━━━━━━━━━━━━━━━\n\n궁금하신 점이 있으면 언제든지 연락 주세요.\n감사합니다.","enabled":true},{"trigger":"@파손면책","text":"안녕하세요.\n메루카리에서 주문하신 상품에 대해 안내드립니다.\n주문하신 상품은 유리나 아크릴 등 파손위험이 높은 재질의 상품으로 배송 중에 파손위험이 높습니다. 저희가 최대한 안전하게 포장하지만, 배송 중 파손될 위험이 있고 운송사에서 보상이 안 됩니다. 그래서 고객님께서 파손 가능성에 동의해 주셔야 국제배송을 진행할 수 있습니다.\n★1:1 문의게시판에 아래 문구를 남겨주세요:\n'국제운송 중 상품이 파손되어도 당사에 책임을 묻지 않겠습니다.'\n동의 확인 후 출하가 진행되오니 1:1 문의게시판이나 고객센터로 빠른 답변 부탁드립니다.\n\n★중요: 본 메시지에 회신이 없으시면 파손면책 동의로 간주하여 자동 진행됩니다.\n회신 기한: [2영업일 이내]\n\n감사합니다.","enabled":true},{"trigger":"@가격인하","text":"コメント失礼します。 即決の場合、000円まで値下げは可能でしょうか？ 検討お願いします。","enabled":true},{"trigger":"@보류실수","text":"해당 상품은 보류 안내를 드렸으나 현지에서 구매가 정상적으로 진행되었습니다. 아직 구매 의사가 있으신 경우, 개인결제를 통해 재결제해 주시면 정상적으로 진행 가능합니다. 번거롭게 해드려 죄송합니다. 구매 의사가 없으신 경우 1:1 문의 게시판으로 회신해 주시면 감사하겠습니다.\n- 회신 지연 혹은 미회신 시 도착한 상품은 폐기 처리됩니다.\n- 개인결제 방법\n[마이페이지]-[마이포켓]-[개인결제]","enabled":true},{"trigger":"@코멘트진행","text":"[메루카리 요청 사항 반영 및 결제 안내]\n\n고객님께서 문의하신 내용에 대해 출품자의 긍정적인 답변과 페이지 수정이 완료되었습니다. 지금 바로 확인 후 결제를 진행해 주시면 감사하겠습니다.\n\n메루카리 이용 에티켓과 관련하여 잠시 안내 말씀 드립니다. 일본 현지 거래 문화상, 페이지 수정 및 답변 이후 결제나 회신 없이 거래가 지연될 경우 출품자로부터 구매 거부 및 블랙리스트 등록 등의 불이익을 받을 수 있습니다. 이는 당사 공식 계정의 신뢰도에도 큰 영향을 미치게 됩니다.\n\n원활한 구매 진행과 향후 지속적인 서비스 이용을 위해, 페이지 반영 후에는 가급적 빠른 결제를 부탁드립니다. 요청 후 장시간 결제나 회신이 이루어지지 않는 사례가 반복될 경우, 부득이하게 문의 요청 서비스 이용이 제한될 수 있는 점 너그러운 양해 부탁드립니다.\n\n항상 저희 서비스를 이용해 주셔서 감사합니다. 만족스러운 쇼핑이 되실 수 있도록 최선을 다하겠습니다.","enabled":true},{"trigger":"@정형외지연","text":"[현지배송 확인중 알림]\n해당 상품은 추적 및 보상이 불가한 배송편으로 발송되었습니다. 이 배송편은 우체국에서 주말 및 공휴일에 처리되지 않아 배송까지 영업일 기준 7~10일이 소요됩니다. 현   try {
    const response = await fetch(PUBLIC_SNIPPETS_URL, { cache: 'no-store' });
    if (!response.ok) return;
    const rows = await response.json();
    if (!Array.isArray(rows) || !rows.length) return;
    snippets = rows.filter(row => row && row.enabled !== false && row.trigger && row.text);
    localStorage.setItem(STORE_KEY, JSON.stringify(snippets));
    selectedIndex = Math.min(selectedIndex, Math.max(0, snippets.length - 1));
    renderSnippets();
    selectSnippet(selectedIndex, false);
    qs('status').textContent = '공용 문구 파일을 불러왔습니다.';
  } catch (_) {}
}
function saveSnippetsToStore() {
  localStorage.setItem(STORE_KEY, JSON.stringify(snippets));
  sendToBridge('saveRows', { rows: snippets });
}
function sendToBridge(type, payload = {}) {
  window.postMessage({ source: 'mercari-dashboard-lite', type, ...payload }, location.origin);
}
function requestBridgeRows() {
  sendToBridge('requestRows');
  window.dispatchEvent(new Event('mercari-dashboard-lite-request'));
}
window.addEventListener('message', (event) => {
  if (event.source !== window || !event.data || event.data.source !== 'mercari-snippets-bridge') return;
  if (event.data.type !== 'rows' || !Array.isArray(event.data.rows)) return;
  bridgeReady = true;
  snippets = event.data.rows.filter(row => row && row.enabled !== false && row.trigger && row.text);
  localStorage.setItem(STORE_KEY, JSON.stringify(snippets));
  selectedIndex = Math.min(selectedIndex, Math.max(0, snippets.length - 1));
  renderSnippets();
  selectSnippet(selectedIndex, false);
  qs('status').textContent = 'Tampermonkey 자동변환 문구와 연결되었습니다.';
});
function parseIds() { return Array.from(new Set((qs('idsInput').value.match(ID_RE) || []).map(x => x.trim()).filter(Boolean))); }
function urlForId(id, mode) { if (/^[A-Za-z0-9]{18,32}$/.test(id) && !/^m\d{9,12}$/i.test(id)) return 'https://jp.mercari.com/shops/product/' + encodeURIComponent(id); return mode === 'item' ? 'https://jp.mercari.com/item/' + encodeURIComponent(id) : 'https://jp.mercari.com/transaction/' + encodeURIComponent(id); }
function renderIds() { qs('idList').innerHTML = parseIds().map(id => '<span class="id">' + escapeHtml(id) + '</span>').join(''); }
function filteredSnippets() { const q = qs('search').value.trim().toLowerCase(); return snippets.map((row, index) => ({...row, index})).filter(row => !q || row.trigger.toLowerCase().includes(q) || row.text.toLowerCase().includes(q)); }
function renderSnippets() { const rows = filteredSnippets(); qs('snippetList').innerHTML = rows.map(row => '<button class="snippet-row ' + (row.index === selectedIndex ? 'active' : '') + '" data-index="' + row.index + '"><strong>' + escapeHtml(row.trigger) + '</strong><span>' + escapeHtml(row.text).replace(/\n/g, ' ') + '</span></button>').join(''); qs('snippetList').querySelectorAll('button').forEach(btn => btn.addEventListener('click', () => selectSnippet(Number(btn.dataset.index)))); if (!rows.some(row => row.index === selectedIndex) && rows[0]) selectSnippet(rows[0].index, false); }
function selectSnippet(index, rerender = true) { selectedIndex = index; const row = snippets[selectedIndex] || { trigger:'', text:'' }; qs('trigger').value = row.trigger || ''; qs('message').value = row.text || ''; qs('status').textContent = ''; if (rerender) renderSnippets(); }
function escapeHtml(value) { return String(value || '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])); }
qs('idsInput').addEventListener('input', renderIds);
qs('search').addEventListener('input', renderSnippets);
qs('openTabs').addEventListener('click', () => { const ids = parseIds(); const mode = qs('mode').value; if (!ids.length) { alert('열 Mercari ID가 없습니다.'); return; } if (ids.length > 12 && !confirm(ids.length + '개 탭을 열까요?')) return; ids.forEach(id => window.open(urlForId(id, mode), 'mercari_' + mode + '_' + id)); });
qs('copyIds').addEventListener('click', async () => { await navigator.clipboard.writeText(parseIds().join(' ')); qs('status').textContent = 'ID를 복사했습니다.'; });
qs('copyMessage').addEventListener('click', async () => { await navigator.clipboard.writeText(qs('message').value); qs('status').textContent = '메시지를 복사했습니다.'; });
qs('saveMessage').addEventListener('click', () => { snippets[selectedIndex] = { trigger: qs('trigger').value.trim(), text: qs('message').value, enabled: true }; saveSnippetsToStore(); renderSnippets(); qs('status').textContent = bridgeReady ? '자동변환 문구에 저장했습니다.' : '이 대시보드에 저장했습니다. Tampermonkey 파일 접근 권한이 꺼져 있으면 자동변환에는 반영되지 않습니다.'; });
qs('resetMessage').addEventListener('click', () => { localStorage.removeItem(STORE_KEY); snippets = DEFAULT_SNIPPETS.slice(); selectedIndex = 0; qs('search').value = ''; sendToBridge('resetRows'); selectSnippet(0); renderSnippets(); qs('status').textContent = '기본 문구로 되돌렸습니다.'; });
(function init() { const params = new URLSearchParams(location.search); const ids = params.get('ids'); const mode = params.get('mode'); if (ids) qs('idsInput').value = ids; if (mode && qs('mode').querySelector('option[value="' + CSS.escape(mode) + '"]')) qs('mode').value = mode; renderIds(); selectSnippet(0, false); renderSnippets(); requestBridgeRows(); loadPublicSnippets(); window.setTimeout(() => { if (!bridgeReady) qs('status').textContent = '대시보드 단독 저장 모드입니다. 자동변환까지 연동하려면 Tampermonkey 스크립트 설치가 필요합니다.'; }, BRIDGE_TIMEOUT_MS); })();
</script>
