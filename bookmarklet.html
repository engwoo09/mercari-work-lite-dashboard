<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mercari Opener Bookmarklets</title>
  <style>
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:#f7f9fc; color:#202124; }
    main { max-width:760px; margin:0 auto; padding:24px; display:grid; gap:16px; }
    section { background:#fff; border:1px solid #dde3ea; border-radius:8px; padding:16px; }
    h1 { margin:0; font-size:22px; }
    p { color:#5f6368; line-height:1.55; }
    .links { display:flex; flex-wrap:wrap; gap:10px; }
    a.bookmarklet { display:inline-flex; align-items:center; justify-content:center; min-width:120px; border:1px solid #1a73e8; border-radius:6px; background:#1a73e8; color:#fff; padding:10px 12px; font-weight:700; text-decoration:none; }
    code { background:#f1f3f4; border-radius:4px; padding:2px 4px; }
  </style>
</head>
<body>
<main>
  <section>
    <h1>Mercari Opener Bookmarklets</h1>
    <p>아래 버튼을 Chrome 북마크바로 드래그해서 설치합니다. Interplanet 주문목록에서 주문 행을 체크한 뒤 실행하세요.</p>
    <div class="links">
      <a class="bookmarklet" href="javascript:(()=>{window.__mercariBookmarkletMode='transaction';const s=document.createElement('script');s.src='https://engwoo09.github.io/mercari-work-lite-dashboard/bookmarklet-runner.js?v='+Date.now();document.body.appendChild(s);})()">Mercari 거래</a>
      <a class="bookmarklet" href="javascript:(()=>{window.__mercariBookmarkletMode='item';const s=document.createElement('script');s.src='https://engwoo09.github.io/mercari-work-lite-dashboard/bookmarklet-runner.js?v='+Date.now();document.body.appendChild(s);})()">Mercari 상품</a>
    </div>
  </section>
  <section>
    <p>체크된 주문 행만 읽습니다. 전체선택 체크박스 또는 체크가 없는 상태에서는 목록 전체를 열지 않습니다.</p>
  </section>
</main>
</body>
</html>
